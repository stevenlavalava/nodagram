<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Casa Selma — Order Desk (draft)</title>
<style>
  :root{--bg:#f6f3ee;--ink:#23201d;--soft:#6b645c;--line:#e3ddd4;--accent:#c0573a;--card:#fff}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  #gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:30px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .wm{font-size:13px;letter-spacing:1px;color:var(--soft);text-transform:uppercase;font-weight:700}
  h1{font-size:20px;margin:10px 0 4px}
  .sub{color:var(--soft);font-size:14px;margin-bottom:20px}
  input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fbfaf7;color:var(--ink)}
  input:focus{outline:none;border-color:var(--accent)}
  button{width:100%;margin-top:12px;padding:12px;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:none;border-radius:9px;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .err{color:var(--accent);font-size:13px;margin-top:12px;min-height:16px}
  iframe{position:fixed;inset:0;width:100%;height:100%;border:0}
</style>
</head>
<body>
<div id="gate">
  <form class="box" id="f">
    <div class="wm">nodagram</div>
    <h1>Protected preview</h1>
    <div class="sub">Enter the password to view.</div>
    <input id="pw" type="password" autocomplete="off" autofocus placeholder="Password" />
    <button id="btn" type="submit">Unlock</button>
    <div class="err" id="err"></div>
  </form>
</div>
